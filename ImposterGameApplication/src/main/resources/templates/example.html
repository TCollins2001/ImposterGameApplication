<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.C Imposter Game | Reveal</title>

    <!-- Luckiest Guy -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

    <!-- Optional main stylesheet -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="transition-div">

    <!-- BACK BUTTON -->
    <a href="#">
        <button type="button"
                class="host-back-btn"
                style="font-family: 'Luckiest Guy', sans-serif; border: 7px solid #ffffff;">
            BACK
        </button>
    </a>

    <!-- REVEAL CARD -->
    <div class="reveal-card vote-slide-up"
         style="
            font-family: 'Luckiest Guy', sans-serif;
            background-color: #1892a2;
            border: 5px solid white;
         ">

        <h2 class="imposter-r" style="color: white;">IMPOSTER REVEAL:</h2>

        <h1 class="imposter-name" style="
            color: #ffffff;
            text-align: center;
            -webkit-text-stroke: 4px #0b2b66;
            text-stroke: 4px #0b2b66;
            text-shadow:
                0px 4px 0px #0b2b66,
                0px 8px 0px rgba(0,0,0,0.35);
        ">
            😏 Alex!
        </h1>

        <!-- RESULTS TABLE -->
        <div class="result-table">

            <div class="row header">
                <div class="cell">Player</div>
                <div class="cell">Role</div>
                <div class="cell">Voted For</div>
                <div class="cell">Round Score</div>
                <div class="cell">Total Score</div>
            </div>

            <div class="row">
                <div class="cell">Alex</div>
                <div class="cell">Imposter</div>
                <div class="cell">Mary ❌</div>
                <div class="cell">0 pts</div>
                <div class="cell">5 pts</div>
            </div>

            <div class="row">
                <div class="cell">Mary</div>
                <div class="cell">Civilian</div>
                <div class="cell">Alex ✅</div>
                <div class="cell">2 pts</div>
                <div class="cell">8 pts</div>
            </div>

            <div class="row">
                <div class="cell">Beda</div>
                <div class="cell">Civilian</div>
                <div class="cell">Alex ✅</div>
                <div class="cell">2 pts</div>
                <div class="cell">9 pts</div>
            </div>

        </div>

        <!-- WIN / LOSE MESSAGE -->
        <div class="wins-mvps-container">

            <div class="imposter-group">
                <h2 style="color:#32CD32; text-align:center;">
                    IMPOSTER LOSES ❌ Group Wins!
                </h2>
            </div>

            <!-- MVPs -->
            <div style="color:#FFD700; text-align:center;">
                <span class="mvp">MVPs 🏆</span>
                <h2 style="color:white;">Mary</h2>
                <h2 style="color:white;">Beda</h2>
            </div>

        </div>

        <!-- NEXT ROUND BUTTON -->
        <div class="next-round-container">
            <button class="vote-btn">
                NEXT ROUND (Round 2) ➜
            </button>
        </div>

        <!-- SCROLL INDICATOR -->
        <div class="scroll-indicator">
            <span>Scroll</span>
            <div class="arrow">▼</div>
        </div>

    </div>

</div>

</body>
</html>
